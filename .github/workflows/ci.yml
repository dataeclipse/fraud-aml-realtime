name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  quality:
    name: lint - type - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync (core + dev + data, without the heavy ML stack)
        run: uv sync --frozen --extra data

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Pytest (fast path)
        run: uv run pytest -m "not fraud and not graph and not stream"

  tests-fraud:
    name: tests (fraud)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync (tabular stack, no torch)
        run: uv sync --frozen --extra tabular

      - name: Pytest (fraud)
        run: uv run pytest -m fraud

  tests-stream:
    name: tests (stream)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync (stream stack)
        run: uv sync --frozen --extra stream

      - name: Pytest (stream, in-memory Bytewax)
        run: uv run pytest -m stream

  tests-graph:
    name: tests (graph)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync (graph stack, CPU torch)
        run: uv sync --frozen --extra graph

      - name: Pytest (graph, tiny GNN forward)
        run: uv run pytest -m graph

  docker:
    name: docker build + smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (api stack)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          tags: fraud-aml-api:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke /healthz (no model -> degraded, but 200)
        run: |
          docker run -d --name api -p 8000:8000 fraud-aml-api:ci
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/healthz || true)
            if [ "$code" = "200" ]; then echo "healthz=200 OK"; docker rm -f api; exit 0; fi
            sleep 2
          done
          echo "healthz did not return 200"; docker logs api; exit 1
