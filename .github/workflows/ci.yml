name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  quality:
    name: lint - type - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync (core + dev + data, without the heavy ML stack)
        run: uv sync --frozen --extra data

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Pytest (fast path)
        run: uv run pytest -m "not fraud and not graph and not stream"
