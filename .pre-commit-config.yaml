# Quality hooks for Project 2. Install: pre-commit install. Update pins: pre-commit autoupdate.
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]
